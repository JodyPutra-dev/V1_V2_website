# Urine Disease Detection System - NGINX Configuration
# Production-Optimized with Proxy Caching
#
# Cache Zones:
#   - static_cache: 100MB for frontend static assets (1 year TTL)
#   - api_cache: 50MB for API responses (2-10 min TTL)
#
# Cached Endpoints:
#   - /api/ml/models: 10 minutes (ML models change infrequently)
#   - /api/users/me: 5 minutes (User profile data)
#   - /api/admin/stats: 2 minutes (Admin statistics update frequently)
#
# Cache Exclusions:
#   - /api/predict/* (user-specific predictions, should never be cached)
#   - /api/auth/* (authentication endpoints, security-sensitive)
#   - POST/PUT/DELETE requests (mutations, should never be cached)
#   - Requests with Authorization header (authenticated, prevent data leakage)
#
# Cache Management:
#   - Purge: POST /api/cache/purge/<endpoint> (requires ngx_cache_purge module)
#   - Clear: POST /api/cache/clear (clears all caches)
#   - Stats: GET /api/cache/stats (cache statistics)
#   - Manual: sudo rm -rf /var/cache/nginx/api/* /var/cache/nginx/static/*
#
# Monitoring:
#   - X-Cache-Status header: HIT, MISS, BYPASS, EXPIRED, STALE
#   - X-Cache-Key header: Shows cache key used
#   - Access logs: /var/log/nginx/urine-app-access.log
#   - Error logs: /var/log/nginx/urine-app-error.log
#
# Cache Hit Rate Monitoring:
#   - grep "X-Cache-Status: HIT" /var/log/nginx/urine-app-access.log | wc -l
#   - grep "X-Cache-Status: MISS" /var/log/nginx/urine-app-access.log | wc -l
#
# Expected Performance:
#   - Static assets: 95%+ cache hit rate (after warmup)
#   - API endpoints: 60-80% cache hit rate (varies by endpoint)
#   - Response time reduction: 50-90% for cached responses
#   - Backend load reduction: 60-80% for cacheable endpoints
#   - Bandwidth savings: 70-85% for static assets (with compression)
#
# Troubleshooting:
#
# Cache not working:
#   - Check cache directories exist: ls -la /var/cache/nginx/
#   - Check permissions: sudo chown -R www-data:www-data /var/cache/nginx/
#   - Check X-Cache-Status header in response
#   - Check nginx error log for cache-related errors
#
# Cache hit rate low:
#   - Verify cache keys are consistent (check X-Cache-Key header)
#   - Check if Authorization header is present (causes bypass)
#   - Verify TTLs are appropriate for data volatility
#   - Check cache zone sizes (may be evicting too frequently)
#
# Stale data issues:
#   - Reduce TTLs for affected endpoints
#   - Implement cache purging on data updates
#   - Use cache bypass for admin users
#
# Cache purge not working:
#   - Check if ngx_cache_purge module is installed: nginx -V | grep cache_purge
#   - Use manual purge: sudo rm -rf /var/cache/nginx/api/*
#   - Restart nginx: sudo systemctl restart nginx

# Compression:
#   - Gzip level 6 for balanced performance
#   - Brotli level 6 (optional, if module available)
#   - Minimum size: 1KB (avoid overhead on small responses)
#   - Content types: text/*, application/json, application/javascript, image/svg+xml
#   - Proxied responses: Compressed via gzip_proxied any
#
# Compression Monitoring:
#   - Check compression: curl -I -H "Accept-Encoding: gzip" http://localhost:7763/api/users/me
#   - Verify Content-Encoding: gzip header
#   - Verify Vary: Accept-Encoding header
#   - Compare sizes: curl --compressed http://localhost:7763/api/users/me | wc -c
#   - Check brotli: curl -I -H "Accept-Encoding: br" http://localhost:7763/api/users/me
#
# Expected Compression Ratios:
#   - JSON responses: 60-80% size reduction
#   - JavaScript/CSS: 70-85% size reduction
#   - HTML: 60-75% size reduction
#   - SVG images: 70-80% size reduction
#
# HTTP/2:
#   - Enabled on SSL listener (port 7763)
#   - Multiplexing: Multiple requests over single connection
#   - Header compression: HPACK reduces header overhead by 30-50%
#   - Binary protocol: More efficient than HTTP/1.1
#
# SSL Session Caching:
#   - 10MB shared cache (~40,000 sessions)
#   - 10-minute timeout
#   - Reduces SSL handshake overhead by 80-90%

# ============================================
# CACHE ZONE DEFINITIONS (HTTP Level)
# ============================================

# Static assets cache zone (frontend JS, CSS, images)
# - 100MB memory for cache keys
# - Max 1GB on disk
# - Files inactive for 1 year are evicted
# - Two-level directory hierarchy for better filesystem performance
proxy_cache_path /var/cache/nginx/static 
    levels=1:2 
    keys_zone=static_cache:100m 
    max_size=1g 
    inactive=365d 
    use_temp_path=off;

# API response cache zone
# - 50MB memory for cache keys
# - Max 500MB on disk
# - Files inactive for 30 minutes are evicted
# - Two-level directory hierarchy
proxy_cache_path /var/cache/nginx/api 
    levels=1:2 
    keys_zone=api_cache:50m 
    max_size=500m 
    inactive=30m 
    use_temp_path=off;

# ============================================
# CACHE KEY CONFIGURATION
# ============================================

# Define cache key to include scheme, method, host, and full URI
# This ensures GET /api/users and POST /api/users have different cache entries
proxy_cache_key "$scheme$request_method$host$request_uri";

# ============================================
# CACHE BYPASS CONDITIONS
# ============================================

# Map Authorization header to cache bypass variable
# If user is authenticated, bypass cache to prevent data leakage
map $http_authorization $skip_cache {
    default 0;          # No auth header = use cache
    "~*Bearer" 1;       # Bearer token present = bypass cache
    "~*Basic" 1;        # Basic auth present = bypass cache
}

# Also check for session cookies
map $http_cookie $skip_cache_cookie {
    default 0;
    "~*session" 1;      # Session cookie = bypass cache
    "~*token" 1;        # Token cookie = bypass cache
}

# Combine both conditions (bypass if either is true)
map "$skip_cache$skip_cache_cookie" $final_skip_cache {
    default 0;
    "~*1" 1;            # If any condition is 1, bypass cache
}

# ============================================
# COMPRESSION CONFIGURATION (HTTP Level)
# ============================================

# Note: Core gzip compression is configured in /etc/nginx/nginx.conf
# Settings: gzip on, gzip_vary on, gzip_comp_level 6, gzip_min_length 1024
# Types: text/*, application/json, application/javascript, image/svg+xml, fonts
# Proxied responses: Compressed via gzip_proxied any

# Brotli Compression (Optional - Requires ngx_brotli module)
# Brotli provides 5-20% better compression than gzip
# Check if available: nginx -V 2>&1 | grep brotli
# To install: sudo apt install libnginx-mod-http-brotli-filter libnginx-mod-http-brotli-static
# brotli on;
# brotli_comp_level 6;
# brotli_types
#     text/plain
#     text/css
#     text/xml
#     text/javascript
#     text/csv
#     application/json
#     application/javascript
#     application/xml
#     application/xml+rss
#     application/atom+xml
#     application/x-javascript
#     image/svg+xml
#     font/truetype
#     font/opentype
#     application/vnd.ms-fontobject;
# brotli_min_length 1024;
# brotli_static on;

# Compression Performance:
#   - Gzip level 6: ~60-80% size reduction for JSON, ~70-85% for text/css/js
#   - CPU overhead: ~2-5% at level 6 (acceptable for most servers)
#   - Bandwidth savings: 60-80% for API responses, 70-85% for static assets
#   - Response time: Faster on slow connections (less data to transfer)
#   - Cache efficiency: Compressed responses cache separately (Vary header)
#
# Brotli vs Gzip:
#   - Brotli: 5-20% smaller files, slightly higher CPU usage
#   - Gzip: Universal browser support, faster compression
#   - Recommendation: Use both (browsers prefer brotli if available)
#
# Monitoring Compression:
#   - Check response headers: curl -I -H "Accept-Encoding: gzip" http://localhost/api/users/me
#   - Verify Content-Encoding: gzip header is present
#   - Verify Vary: Accept-Encoding header is present
#   - Compare sizes: curl --compressed vs curl (without compression)

# ============================================
# RATE LIMITING AND DDOS PROTECTION
# ============================================
#
# Rate Limiting Zones:
#   - auth_limit: 10 req/s (burst 20) - Authentication endpoints
#   - prediction_limit: 50 req/s (burst 100) - ML prediction endpoints
#   - api_limit: 100 req/s (burst 200) - General API endpoints
#
# Connection Limiting:
#   - conn_limit: 10 concurrent connections per IP
#
# Request Size Limits:
#   - Default: 1MB (JSON requests)
#   - Predictions: 10MB (CSV file uploads)
#
# Timeouts (Slow Request Protection):
#   - Default: 60 seconds (client_body_timeout, send_timeout)
#   - Predictions: 120 seconds (file uploads and ML processing)
#   - Proxy: 300 seconds (backend processing)
#
# IP Whitelisting:
#   - 127.0.0.1 (localhost) - bypasses all rate limits
#   - 172.29.156.41 (internal IP) - bypasses all rate limits
#   - Purpose: Prevent self-rate-limiting when services call each other
#
# Admin Bypass:
#   - Header: X-Admin-Bypass: admin-bypass-secret-change-this
#   - Purpose: Allow admin users to bypass rate limits
#   - Security: Change secret in production, use strong random value
#
# Rate Limit Responses:
#   - Status: 429 Too Many Requests
#   - Headers: X-Rate-Limit-Zone, X-Rate-Limit, Retry-After
#   - Body: JSON with error details and retry information
#
# Geo-Blocking (Optional):
#   - Currently disabled (commented out)
#   - Can be enabled to block specific countries/IP ranges
#   - Requires GeoIP database or manual IP range configuration
#
# Monitoring Rate Limits:
#
# Check rate limit events in error log:
#   - grep "limiting requests" /var/log/nginx/urine-app-error.log
#   - grep "limiting connections" /var/log/nginx/urine-app-error.log
#
# Count rate limit rejections:
#   - grep "429" /var/log/nginx/urine-app-access.log | wc -l
#
# Identify top rate-limited IPs:
#   - grep "429" /var/log/nginx/urine-app-access.log | awk '{print $1}' | sort | uniq -c | sort -rn | head -10
#
# Check rate limit zone memory usage:
#   - curl http://localhost/nginx_status (requires stub_status module)
#
# Monitor rate limit headers in responses:
#   - curl -I http://localhost/api/users/me | grep X-Rate-Limit
#
# Troubleshooting Rate Limits:
#
# Legitimate users getting rate limited:
#   - Increase burst values in limit_req directives
#   - Increase rate in limit_req_zone definitions
#   - Add user's IP to whitelist (geo $limit_whitelist)
#   - Provide admin bypass header for admin users
#
# Rate limits not working:
#   - Check nginx error log for configuration errors
#   - Verify rate limit zones are defined at http level
#   - Verify limit_req directives are in location blocks
#   - Test with: ab -n 100 -c 10 http://localhost/api/users/me
#
# Services rate limiting each other:
#   - Verify localhost (127.0.0.1) is whitelisted
#   - Verify internal IP (172.29.156.41) is whitelisted
#   - Check $rate_limit_key variable is empty for whitelisted IPs
#
# Admin bypass not working:
#   - Verify X-Admin-Bypass header is sent with correct secret
#   - Check $admin_bypass variable in nginx error log (debug mode)
#   - Verify map directive for admin bypass is correct
#
# Connection limit too restrictive:
#   - Increase limit_conn value (currently 10)
#   - Consider per-endpoint connection limits instead of global
#   - Monitor concurrent connections: netstat -an | grep :7763 | wc -l
#
# Best Practices:
#
# 1. Adjust rate limits based on actual traffic patterns:
#    - Monitor 429 responses and adjust limits accordingly
#    - Use burst values 2-3x the base rate for traffic spikes
#    - Different endpoints may need different limits
#
# 2. Use nodelay for better user experience:
#    - Processes burst requests immediately without queuing
#    - Better for interactive applications
#    - May increase backend load during bursts
#
# 3. Whitelist known good IPs:
#    - Internal services (localhost, internal IPs)
#    - Monitoring systems
#    - Trusted partners or CDNs
#
# 4. Implement admin bypass carefully:
#    - Use strong random secret (not default)
#    - Rotate secret periodically
#    - Log admin bypass usage for audit
#
# 5. Monitor rate limit effectiveness:
#    - Track 429 response rate (should be < 1% of total requests)
#    - Identify patterns in rate-limited IPs (potential attacks)
#    - Adjust limits based on legitimate vs malicious traffic
#
# 6. Combine with other DDoS protection:
#    - Use fail2ban to ban IPs with excessive 429 responses
#    - Implement geo-blocking for known attack sources
#    - Use CDN/WAF for additional protection layer
#
# 7. Test rate limits before production:
#    - Use load testing tools (ab, wrk, k6) to verify limits
#    - Test burst handling with sudden traffic spikes
#    - Verify whitelisting and admin bypass work correctly
#
# Security Considerations:
#
# 1. Rate limiting is not a complete DDoS solution:
#    - Protects against application-layer attacks
#    - Does not protect against network-layer attacks (SYN flood, etc.)
#    - Use firewall and network-level protection for comprehensive defense
#
# 2. Admin bypass secret must be changed:
#    - Default: admin-bypass-secret-change-this
#    - Production: Use strong random value (32+ characters)
#    - Rotate: Change secret periodically (monthly/quarterly)
#    - Distribute: Securely share with admin users only
#
# 3. Whitelisted IPs should be reviewed:
#    - Only whitelist trusted IPs
#    - Remove whitelisting if IP is compromised
#    - Monitor whitelisted IP traffic for anomalies
#
# 4. Log rate limit events for security monitoring:
#    - Track IPs with high 429 response rates
#    - Alert on sudden spikes in rate limit rejections
#    - Investigate patterns that may indicate attacks
#
# 5. Combine rate limiting with authentication:
#    - Rate limits are per-IP, not per-user
#    - Authenticated users may need higher limits
#    - Consider per-user rate limiting in application layer

# ============================================
# IP WHITELIST CONFIGURATION
# ============================================

# Whitelist localhost and internal IPs to bypass rate limiting
# This prevents self-rate-limiting when services call each other
geo $limit_whitelist {
    default "";                 # Default: not whitelisted (rate limiting applies)
    127.0.0.1 1;               # Localhost - bypass rate limiting
    172.29.156.41 1;           # Internal IP - bypass rate limiting
}

# ============================================
# ADMIN BYPASS HEADER DETECTION
# ============================================

# Detect admin bypass header for rate limit exemption
# Change the secret value in production to a strong random value
map $http_x_admin_bypass $admin_bypass {
    default "";                                    # Default: no bypass
    "admin-bypass-secret-change-this" 1;          # Admin bypass secret (CHANGE IN PRODUCTION!)
}

# ============================================
# COMBINED BYPASS VARIABLE
# ============================================

# Combine whitelist and admin bypass into single rate limit key
# If either whitelist or admin bypass is active, set key to empty (bypass rate limiting)
# Otherwise, use binary IP address for rate limiting
map "$limit_whitelist$admin_bypass" $rate_limit_key {
    default $binary_remote_addr;    # Apply rate limiting based on IP
    "~*1" "";                        # Bypass rate limiting if whitelisted or admin bypass
}

# ============================================
# RATE LIMITING ZONES
# ============================================

# Authentication endpoints zone - Strict limit to prevent brute force attacks
# 10 requests per second per IP, stores ~160,000 IP addresses
limit_req_zone $rate_limit_key zone=auth_limit:10m rate=10r/s;

# Prediction endpoints zone - Medium limit for ML processing
# 50 requests per second per IP, stores ~320,000 IP addresses
limit_req_zone $rate_limit_key zone=prediction_limit:20m rate=50r/s;

# General API zone - Higher limit for normal operations
# 100 requests per second per IP, stores ~320,000 IP addresses
limit_req_zone $rate_limit_key zone=api_limit:20m rate=100r/s;

# ============================================
# CONNECTION LIMITING ZONE
# ============================================

# Limit concurrent connections per IP to prevent connection exhaustion
# Stores ~160,000 IP addresses
limit_conn_zone $rate_limit_key zone=conn_limit:10m;

# ============================================
# RATE LIMITING GLOBAL CONFIGURATION
# ============================================

# Return 429 Too Many Requests instead of default 503
limit_req_status 429;
limit_conn_status 429;

# Log rate limit events at warn level for monitoring
limit_req_log_level warn;

# ============================================
# GEO-BLOCKING CONFIGURATION (OPTIONAL, COMMENTED OUT)
# ============================================

# Uncomment and configure to block specific countries or IP ranges
# Requires GeoIP database or manual IP range configuration
#
# geo $geo_block {
#     default 0;                    # Default: allow
#     # Block specific IP ranges (example - known attack sources)
#     # 192.0.2.0/24 1;             # Block this IP range
#     # 198.51.100.0/24 1;          # Block this IP range
# }
#
# To use geo-blocking, add this to server blocks:
# if ($geo_block) {
#     return 403 '{"error":"Forbidden","status":403,"message":"Access denied from your location"}';
# }

# ============================================
# UPSTREAM BACKENDS FOR PM2 CLUSTERED SERVICES
# ============================================
# These upstream blocks load balance requests across PM2 clustered instances
# PM2 automatically assigns ports: PORT + instance_index
# Health checks ensure requests only go to healthy instances
#
# Upstream Configuration Benefits:
#   - Load Balancing: Distributes requests across PM2 instances
#   - Health Checks: max_fails=3, fail_timeout=30s (passive health checking)
#   - Connection Pooling: keepalive maintains persistent connections
#   - Least Connections: Routes to instance with fewest active connections
#   - Automatic Failover: If instance fails, routes to healthy instances

upstream gateway_backend {
    least_conn;  # Load balancing method: least connections (better than round-robin for varying request times)
    
    server 127.0.0.1:7764 max_fails=3 fail_timeout=30s;  # Gateway instance 0
    server 127.0.0.1:7765 max_fails=3 fail_timeout=30s;  # Gateway instance 1
    
    keepalive 32;  # Keep 32 connections alive for connection reuse
}

upstream user_backend {
    least_conn;
    
    server 127.0.0.1:3001 max_fails=3 fail_timeout=30s;  # User instance 0
    server 127.0.0.1:3002 max_fails=3 fail_timeout=30s;  # User instance 1
    
    keepalive 16;
}

upstream prediction_backend {
    least_conn;
    
    server 127.0.0.1:3004 max_fails=3 fail_timeout=30s;  # Prediction instance 0
    server 127.0.0.1:3005 max_fails=3 fail_timeout=30s;  # Prediction instance 1
    
    keepalive 16;
}

upstream ml_backend {
    least_conn;
    
    server 127.0.0.1:3002 max_fails=3 fail_timeout=30s;  # ML instance 0
    server 127.0.0.1:3003 max_fails=3 fail_timeout=30s;  # ML instance 1
    
    keepalive 16;
}

upstream admin_backend {
    # Single instance, no load balancing needed
    server 127.0.0.1:3003 max_fails=3 fail_timeout=30s;  # Admin instance 0
    
    keepalive 8;
}

# ============================================
# SERVER BLOCK: PORT 8443 (HTTP Frontend + API)
# ============================================

server {
    listen 8443;
    server_name localhost 172.29.156.41 udetect.ebergroup.com;

    # Log settings
    error_log /var/log/nginx/urine-app-error.log;
    access_log /var/log/nginx/urine-app-access.log;

    # Connection limiting and request size limits
    limit_conn conn_limit 10;              # Max 10 concurrent connections per IP
    client_max_body_size 1m;               # Default 1MB for JSON requests
    client_body_timeout 60s;               # Slow request protection - 60 second timeout
    send_timeout 60s;                      # Slow response protection - 60 second timeout

    # ========================================
    # CACHEABLE API ENDPOINTS (Specific)
    # ========================================
    # These must come BEFORE the general /api location
    # NGINX matches most specific locations first

    # ML Models endpoint - 10 minute cache
    # Models change infrequently, safe to cache longer
    location = /api/ml/models {
        # Rate limiting
        limit_req zone=api_limit burst=200 nodelay;

        proxy_cache api_cache;
        proxy_cache_valid 200 10m;      # Cache successful responses for 10 minutes
        proxy_cache_valid 404 1m;        # Cache 404s briefly
        proxy_cache_bypass $final_skip_cache;
        proxy_no_cache $final_skip_cache;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_background_update on;
        proxy_cache_lock on;
        proxy_cache_lock_timeout 5s;
        
        add_header X-Cache-Status $upstream_cache_status always;
        add_header X-Cache-Key "$scheme$request_method$host$request_uri" always;
        
        proxy_pass http://gateway_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_intercept_errors off;
        proxy_read_timeout 300;
        proxy_connect_timeout 300;
        proxy_send_timeout 300;
    }

    # User profile endpoint - 5 minute cache
    # User data changes moderately, medium TTL
    location = /api/users/me {
        # Rate limiting
        limit_req zone=api_limit burst=200 nodelay;

        proxy_cache api_cache;
        proxy_cache_valid 200 5m;
        proxy_cache_valid 404 1m;
        proxy_cache_bypass $final_skip_cache;
        proxy_no_cache $final_skip_cache;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_background_update on;
        proxy_cache_lock on;
        proxy_cache_lock_timeout 5s;
        
        add_header X-Cache-Status $upstream_cache_status always;
        add_header X-Cache-Key "$scheme$request_method$host$request_uri" always;
        
        proxy_pass http://gateway_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_intercept_errors off;
        proxy_read_timeout 300;
        proxy_connect_timeout 300;
        proxy_send_timeout 300;
    }

    # Admin stats endpoint - 2 minute cache
    # Statistics change frequently, short TTL
    location = /api/admin/stats {
        # Rate limiting
        limit_req zone=api_limit burst=200 nodelay;

        proxy_cache api_cache;
        proxy_cache_valid 200 2m;
        proxy_cache_valid 404 1m;
        proxy_cache_bypass $final_skip_cache;
        proxy_no_cache $final_skip_cache;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_background_update on;
        proxy_cache_lock on;
        proxy_cache_lock_timeout 5s;
        
        add_header X-Cache-Status $upstream_cache_status always;
        add_header X-Cache-Key "$scheme$request_method$host$request_uri" always;
        
        proxy_pass http://gateway_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_intercept_errors off;
        proxy_read_timeout 300;
        proxy_connect_timeout 300;
        proxy_send_timeout 300;
    }

    # ========================================
    # RATE-LIMITED API ENDPOINTS (Specific)
    # ========================================

    # Auth endpoints - Strict rate limiting (10 req/s) to prevent brute force
    location ~ ^/api/auth {
        # Rate limiting
        limit_req zone=auth_limit burst=20 nodelay;

        # Rate limit headers for monitoring
        add_header X-Rate-Limit-Zone "auth_limit" always;
        add_header X-Rate-Limit "10r/s" always;

        # Cache bypass (auth endpoints should never be cached)
        proxy_cache_bypass 1;
        proxy_no_cache 1;
        add_header X-Cache-Status $upstream_cache_status always;
        
        # Proxy settings
        proxy_pass http://gateway_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_intercept_errors off;
        proxy_read_timeout 300;
        proxy_connect_timeout 300;
        proxy_send_timeout 300;
    }

    # Prediction endpoints - Medium rate limiting (50 req/s) for ML processing
    location ~ ^/api/predict {
        # Rate limiting
        limit_req zone=prediction_limit burst=100 nodelay;

        # Allow larger request body for CSV uploads
        client_max_body_size 10m;
        client_body_timeout 120s;               # Longer timeout for file uploads

        # Rate limit headers for monitoring
        add_header X-Rate-Limit-Zone "prediction_limit" always;
        add_header X-Rate-Limit "50r/s" always;

        # Cache bypass (predictions are user-specific, should never be cached)
        proxy_cache_bypass 1;
        proxy_no_cache 1;
        add_header X-Cache-Status $upstream_cache_status always;
        
        # Proxy settings with longer timeout for ML processing
        proxy_pass http://gateway_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_intercept_errors off;
        proxy_read_timeout 300;
        proxy_connect_timeout 300;
        proxy_send_timeout 300;
    }

    # ========================================
    # GENERAL API ENDPOINT (No Caching)
    # ========================================
    # This catches all other /api requests
    # Explicitly exclude predictions, auth, and mutations

    location /api {
        # Rate limiting
        limit_req zone=api_limit burst=200 nodelay;

        # Rate limit headers for monitoring
        add_header X-Rate-Limit-Zone "api_limit" always;
        add_header X-Rate-Limit "100r/s" always;

        # Set cache bypass for excluded endpoints
        set $skip_cache_api 0;
        
        # Exclude predictions (user-specific, should never be cached)
        if ($request_uri ~* "^/api/predict") {
            set $skip_cache_api 1;
        }
        
        # Exclude auth endpoints (security-sensitive)
        if ($request_uri ~* "^/api/auth") {
            set $skip_cache_api 1;
        }
        
        # Exclude non-GET/HEAD methods (mutations)
        if ($request_method !~ ^(GET|HEAD)$) {
            set $skip_cache_api 1;
        }
        
        proxy_cache_bypass $skip_cache_api;
        proxy_no_cache $skip_cache_api;
        add_header X-Cache-Status $upstream_cache_status always;
        
        proxy_pass http://gateway_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_intercept_errors off;
        proxy_read_timeout 300;
        proxy_connect_timeout 300;
        proxy_send_timeout 300;
    }

    # ========================================
    # FRONTEND STATIC FILES
    # ========================================

    # Static assets (JS, CSS, images, fonts) - 1 year cache
    # These files have content hashes in filenames, safe for long caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        root /var/www/html/HIBAH/frontend/build;
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Cache-Status "STATIC";
        access_log off;     # Reduce log noise for static assets
    }

    # HTML files - no cache
    # SPA routing requires fresh HTML for proper navigation
    location ~* \.html$ {
        root /var/www/html/HIBAH/frontend/build;
        expires -1;
        add_header Cache-Control "no-cache";
    }

    # Default location for other files
    location / {
        root /var/www/html/HIBAH/frontend/build;
        try_files $uri $uri/ /index.html;
        index index.html;
    }

    # Custom error pages only for non-API routes
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }

    # Rate limiting error response
    error_page 429 /429.html;
    location = /429.html {
        return 429 '{"error":"Too Many Requests","status":429,"message":"Rate limit exceeded. Please try again later.","retry_after":"1s"}';
        add_header Content-Type application/json always;
        add_header Retry-After 1 always;
    }
}

