# ============================================
# SERVER BLOCK: PORT 443 (SSL Frontend + API)
# ============================================

server {
    listen 443 ssl http2;
    server_name localhost 172.29.156.41 udetect.ebergroup.com;

    # SSL configuration
    # Uses Let's Encrypt cert when available (udetect.ebergroup.com),
    # falls back to Ubuntu snakeoil self-signed cert for local dev.
    ssl_certificate /etc/nginx/ssl/certificate.crt;
    ssl_certificate_key /etc/nginx/ssl/private.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_stapling off;

    # SSL Session Caching:
    #   - Shared cache across all worker processes (10MB = ~40,000 sessions)
    #   - Reduces SSL handshake overhead by 80-90% for returning clients
    #   - 10-minute timeout balances security with performance
    #   - Session tickets disabled for better forward secrecy
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_session_tickets off;

    # HTTP/2 Buffer Optimization:
    #   - Larger header sizes accommodate JWT tokens and large cookies
    #   - Body preread improves performance for prediction requests (JSON/CSV uploads)
    #   - Note: http2_max_field_size and http2_max_header_size are obsolete in newer NGINX versions
    #   - Use large_client_header_buffers instead for both HTTP/1.1 and HTTP/2
    large_client_header_buffers 4 32k;
    http2_body_preread_size 64k;

