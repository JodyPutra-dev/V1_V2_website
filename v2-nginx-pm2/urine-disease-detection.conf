    # GENERAL API ENDPOINT (With CORS)
    # ========================================

    # Note: Gzip compression is applied to proxied responses via top-level gzip_proxied directive
    # Backend JSON responses are compressed automatically based on Accept-Encoding header

    location /api/ {
        # Handle CORS preflight
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE, PATCH' always;
            add_header 'Access-Control-Allow-Headers' 'Origin, X-Requested-With, Content-Type, Accept, Authorization, user-id' always;
            add_header 'Access-Control-Max-Age' 86400 always;
            add_header 'Content-Type' 'text/plain charset=UTF-8' always;
            add_header 'Content-Length' 0 always;
            return 204;
        }
        
        # Rate limiting
        limit_req zone=api_limit burst=200 nodelay;

        # Rate limit headers for monitoring
        add_header X-Rate-Limit-Zone "api_limit" always;
        add_header X-Rate-Limit "100r/s" always;

        # Set cache bypass for excluded endpoints
        set $skip_cache_api 0;
        
        # Exclude predictions (user-specific, should never be cached)
        if ($request_uri ~* "^/api/predict") {
            set $skip_cache_api 1;
        }
        
        # Exclude auth endpoints (security-sensitive)
        if ($request_uri ~* "^/api/auth") {
            set $skip_cache_api 1;
        }
        
        # Exclude non-GET/HEAD methods (mutations)
        if ($request_method !~ ^(GET|HEAD)$) {
            set $skip_cache_api 1;
        }
        
        # CORS headers
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE, PATCH' always;
        add_header 'Access-Control-Allow-Headers' 'Origin, X-Requested-With, Content-Type, Accept, Authorization, user-id' always;
        
        # Debug headers
        add_header 'X-Debug-Request-URI' $request_uri always;
        add_header 'X-Debug-URI' $uri always;
        add_header X-Cache-Status $upstream_cache_status always;
        
        proxy_cache_bypass $skip_cache_api;
        proxy_no_cache $skip_cache_api;
        
        # Proxy to our Node.js gateway service (on the same port)
        proxy_pass http://gateway_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;
        
        # Turn off error interception to preserve original status codes
        proxy_intercept_errors off;
        proxy_read_timeout 300;
        proxy_connect_timeout 300;
        proxy_send_timeout 300;
    }

    # ========================================
    # FRONTEND STATIC FILES
    # ========================================

    # Static assets - 1 year cache with CORS
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        root /var/www/html/HIBAH/frontend/build;
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Cache-Status "STATIC";
        add_header 'Access-Control-Allow-Origin' '*' always;
        access_log off;
    }

    # HTML files - no cache with CORS
    location ~* \.html$ {
        root /var/www/html/HIBAH/frontend/build;
        expires -1;
        add_header Cache-Control "no-cache";
        add_header 'Access-Control-Allow-Origin' '*' always;
    }

    # Default frontend location
    location / {
        root /var/www/html/HIBAH/frontend/build;
        try_files $uri $uri/ /index.html;
        index index.html;
        
        # CORS headers
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE, PATCH' always;
        add_header 'Access-Control-Allow-Headers' 'Origin, X-Requested-With, Content-Type, Accept, Authorization' always;
    }

    # ========================================
    # SERVICE HEALTH CHECK ENDPOINTS
    # ========================================

    # Test endpoint for ML service
    location = /ml-service-test {
        proxy_pass http://localhost:3002/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_intercept_errors off;
    }
    
    # Test endpoint for User service
    location = /user-service-test {
        proxy_pass http://localhost:3001/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_intercept_errors off;
    }

    # Custom error pages only for non-API frontend routes
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        return 500 '{"error":"Server Error","status":500,"message":"An unexpected server error occurred"}';
    }

    # Rate limiting error response (with CORS)
    error_page 429 /429.html;
    location = /429.html {
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header Content-Type application/json always;
        add_header Retry-After 1 always;
        return 429 '{"error":"Too Many Requests","status":429,"message":"Rate limit exceeded. Please try again later.","retry_after":1,"limit_type":"$limit_req_status"}';
    }
} 